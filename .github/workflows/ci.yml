name: CI — GestPro CRM

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

env:
  NODE_VERSION: '20'

jobs:
  # ─── Lint & Build ────────────────────────────────────────
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: api

      - name: Lint
        run: npm run lint

      - name: Build API
        run: npm run build -w api

      - name: Build Web
        run: npm run build -w web
        env:
          VITE_API_URL: http://localhost:3000

  # ─── Unit Tests ──────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: api

      - name: Run API Tests
        run: npx jest --verbose --ci --coverage
        working-directory: api

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage/
          retention-days: 7

  # ─── E2E Tests ───────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Cypress)
    runs-on: ubuntu-latest
    needs: lint-build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gestpro_test
          POSTGRES_PASSWORD: gestpro_test
          POSTGRES_DB: gestpro_crm_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client & migrate
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npx ts-node prisma/seed.ts
        working-directory: api
        env:
          DATABASE_URL: postgresql://gestpro_test:gestpro_test@localhost:5432/gestpro_crm_test

      - name: Start API (background)
        run: npm run dev:api &
        env:
          DATABASE_URL: postgresql://gestpro_test:gestpro_test@localhost:5432/gestpro_crm_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_ACCESS_SECRET: ci-test-access-secret-32chars-ok
          JWT_REFRESH_SECRET: ci-test-refresh-secret-32chars-ok
          PORT: 3000
          NODE_ENV: test

      - name: Start Web (background)
        run: npm run dev:web &
        env:
          VITE_API_URL: http://localhost:3000

      - name: Wait for services
        run: |
          npx wait-on http://localhost:3000/api/health http://localhost:5173 --timeout 60000

      - name: Run Cypress E2E
        run: npm run cy:run:ci
        working-directory: web
        env:
          CYPRESS_adminEmail: admin@demo.com
          CYPRESS_adminPassword: Admin1234!

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: web/cypress/screenshots/
          retention-days: 3
