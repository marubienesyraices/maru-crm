user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Límites de subida (imágenes/docs)
    client_max_body_size 25M;

    # Ocultar versión de nginx
    server_tokens off;

    # Gzip global
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # DNS interno de Docker — re-resuelve IPs de contenedores cada 30s
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ─── Upstream services ─────────────────────────────────────────────────
    upstream api {
        server api:3000;
    }

    upstream web {
        server web:80;
    }

    upstream portal {
        server portal:3001;
    }

    # ─── HTTP → HTTPS redirect ─────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ─── HTTPS — API (api.tudominio.com) ───────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name api.gestprop.net;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Cabeceras de seguridad
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 120s;
        }
    }

    # ─── HTTPS — CRM web (crm.tudominio.com) ──────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name crm.gestprop.net;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://api.gestprop.net https://api.mapbox.com https://events.mapbox.com https://*.ingest.sentry.io https://maps.googleapis.com https://places.googleapis.com; worker-src blob:;" always;

        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── HTTPS — Portal público: www.gestprop.net ──────────────────────────
    # dominio_personalizado en config_portal del tenant demo es "www.gestprop.net"
    # (match exacto en ConfigPortalService.findByDomain); el apex redirige a www
    # para que el Host que llega al backend siempre coincida con ese valor y no
    # dependa del fallback findDefault() (primer tenant activo).
    server {
        listen 443 ssl;
        http2 on;
        server_name www.gestprop.net;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;

        location / {
            proxy_pass http://portal;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name gestprop.net;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        return 301 https://www.gestprop.net$request_uri;
    }

    # ─── HTTPS — Portal cliente: www.marubienesraices.com ──────────────────
    # dominio_personalizado en config_portal es "www.marubienesraices.com"
    # (match exacto en ConfigPortalService.findByDomain), por eso el apex
    # redirige a www en vez de servir el portal directamente.
    server {
        listen 443 ssl;
        http2 on;
        server_name www.marubienesraices.com;

        ssl_certificate     /etc/nginx/certs/marubienesraices.fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/marubienesraices.privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;

        location / {
            proxy_pass http://portal;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name marubienesraices.com;

        ssl_certificate     /etc/nginx/certs/marubienesraices.fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/marubienesraices.privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        return 301 https://www.marubienesraices.com$request_uri;
    }
}
