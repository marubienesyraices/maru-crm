# Uso: docker compose -f docker-compose.qa.yml --env-file .env.qa up -d

services:

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gestprop-db-qa
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata_qa:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal_qa

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gestprop-redis-qa
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata_qa:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal_qa

  # ─── API (NestJS) ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: gestprop-api-qa
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
      DATABASE_APP_URL: postgresql://${DB_APP_USER}:${DB_APP_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3000
      FRONTEND_URL: ${FRONTEND_URL}
      APP_URL: ${APP_URL}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      MAPBOX_TOKEN: ${MAPBOX_TOKEN}
      VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
      PORTAL_TENANT_ID: ${PORTAL_TENANT_ID}
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      META_PAGE_ACCESS_TOKEN: ${META_PAGE_ACCESS_TOKEN:-}
      META_PAGE_ID: ${META_PAGE_ID:-}
      META_IG_USER_ID: ${META_IG_USER_ID:-}
      ZOOM_ACCOUNT_ID: ${ZOOM_ACCOUNT_ID:-}
      ZOOM_CLIENT_ID: ${ZOOM_CLIENT_ID:-}
      ZOOM_CLIENT_SECRET: ${ZOOM_CLIENT_SECRET:-}
      DOCUSIGN_INTEGRATION_KEY: ${DOCUSIGN_INTEGRATION_KEY:-}
      DOCUSIGN_CLIENT_SECRET: ${DOCUSIGN_CLIENT_SECRET:-}
      DOCUSIGN_ACCOUNT_ID: ${DOCUSIGN_ACCOUNT_ID:-}
      DOCUSIGN_USER_ID: ${DOCUSIGN_USER_ID:-}
      DOCUSIGN_RSA_PRIVATE_KEY: ${DOCUSIGN_RSA_PRIVATE_KEY:-}
      DOCUSIGN_BASE_URL: ${DOCUSIGN_BASE_URL:-https://demo.docusign.net/restapi}
      SENTRY_DSN: ${SENTRY_DSN_API:-}
    volumes:
      - uploads_qa:/app/api/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal_qa
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Migrate (one-shot) ────────────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: api/Dockerfile
      target: migrator
    container_name: gestprop-migrate-qa
    restart: "no"
    working_dir: /app/api
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
    command: sh -c "npx prisma migrate deploy"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal_qa

  # ─── CRM Web (React + nginx) ───────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_URL: ${APP_URL}
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN}
        VITE_SENTRY_DSN: ${SENTRY_DSN_WEB:-}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    container_name: gestprop-web-qa
    restart: unless-stopped
    networks:
      - internal_qa
    depends_on:
      - api

  # ─── Portal público (Next.js) ──────────────────────────────────────────────
  portal:
    build:
      context: .
      dockerfile: portal/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${APP_URL}
        NEXT_PUBLIC_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    container_name: gestprop-portal-qa
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${APP_URL}
      # La red `internal_qa` no tiene salida a internet: los fetches SSR deben usar
      # el nombre de servicio Docker en vez del dominio público (inalcanzable).
      INTERNAL_API_URL: http://api:3000
    networks:
      - internal_qa
    depends_on:
      - api

  # ─── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: gestprop-nginx-qa
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.qa.conf:/etc/nginx/nginx.conf:ro
      - ./infra/certs-qa:/etc/nginx/certs-qa:ro
      - nginx_logs_qa:/var/log/nginx
    depends_on:
      - api
      - web
      - portal
    networks:
      - internal_qa
      - external_qa

networks:
  internal_qa:
    driver: bridge
    internal: true
  external_qa:
    driver: bridge

volumes:
  pgdata_qa:
  redisdata_qa:
  uploads_qa:
  nginx_logs_qa:
