version: '3.8'

# Uso: docker compose -f docker-compose.prod.yml --env-file .env.production up -d

services:

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: maru-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: maru-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── API (NestJS) ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: maru-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3000
      FRONTEND_URL: ${FRONTEND_URL}
      APP_URL: ${APP_URL}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      MAPBOX_TOKEN: ${MAPBOX_TOKEN}
      PORTAL_TENANT_ID: ${PORTAL_TENANT_ID}
      SENTRY_DSN: ${SENTRY_DSN_API}
    volumes:
      - uploads:/app/api/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Migrate (one-shot) ────────────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: maru-migrate
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
    command: sh -c "npx prisma migrate deploy"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  # ─── CRM Web (React + nginx) ───────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_URL: ${APP_URL}
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN}
    container_name: maru-web
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - api

  # ─── Portal público (Next.js) ──────────────────────────────────────────────
  portal:
    build:
      context: .
      dockerfile: portal/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${APP_URL}
        NEXT_PUBLIC_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN}
    container_name: maru-portal
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${APP_URL}
    networks:
      - internal
    depends_on:
      - api

  # ─── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: maru-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - web
      - portal
    networks:
      - internal
      - external

  # ─── Backup (cron diario) ──────────────────────────────────────────────────
  backup:
    image: postgres:16-alpine
    container_name: maru-backup
    restart: unless-stopped
    environment:
      PGPASSWORD: ${DB_PASSWORD}
      DB_USER: ${DB_USER}
      DB_NAME: ${DB_NAME}
      R2_BUCKET: ${R2_BUCKET}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
    volumes:
      - ./infra/backup/backup.sh:/backup.sh:ro
      - backups:/backups
    command: sh -c "chmod +x /backup.sh && crond -f"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  uploads:
  backups:
  nginx_logs:
