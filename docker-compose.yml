version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: maru-crm-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: maru_admin
      POSTGRES_PASSWORD: maru_secret_2026
      POSTGRES_DB: maru_crm
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: maru-crm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
