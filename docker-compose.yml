services:
  postgres:
    image: postgres:16-alpine
    container_name: gestprop-crm-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gestprop_admin
      POSTGRES_PASSWORD: gestprop_secret_2026
      POSTGRES_DB: gestprop_crm
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gestprop-crm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
